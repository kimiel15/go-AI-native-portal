name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_ENDPOINT_URL: ${{ secrets.AI_ENDPOINT_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # prisma db push runs inside Azure at startup (startup command), not here.
      # GitHub Actions runners are outside Azure's network and can't reach
      # the PostgreSQL server. The startup command handles table creation.

      - name: Package standalone bundle
        run: |
          mkdir -p deploy-pkg
          cp -r .next/standalone/. deploy-pkg/
          mkdir -p deploy-pkg/.next/static
          cp -r .next/static/. deploy-pkg/.next/static/
          if [ -d public ]; then cp -r public deploy-pkg/public; fi
          cp -r prisma deploy-pkg/prisma
          cp startup.sh deploy-pkg/startup.sh
          chmod +x deploy-pkg/startup.sh

          # The Next.js standalone bundle omits dev-only packages like the
          # Prisma CLI. Copy it explicitly so startup.sh can run `db push`.
          mkdir -p deploy-pkg/node_modules
          cp -r node_modules/prisma deploy-pkg/node_modules/prisma
          cp -r node_modules/@prisma deploy-pkg/node_modules/@prisma

          cd deploy-pkg && zip -r ../deploy.zip . -x "*.map"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: go-ai-native-portal
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
